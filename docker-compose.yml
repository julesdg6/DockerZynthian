services:
  dockerzynthian:
    build: .
    container_name: dockerzynthian
    privileged: true
    restart: unless-stopped
    environment:
      DATA_DIR: ${DATA_DIR:-/data}
      DOWNLOAD_DIR: ${DOWNLOAD_DIR:-/data/downloads}
      IMAGE_PATH: ${IMAGE_PATH:-/data/zynthian.img}
      BOOT_DIR: ${BOOT_DIR:-/data/bootfiles}
      MEMORY_MB: ${MEMORY_MB:-1024}
      PI_MODEL: ${PI_MODEL:-pi3}
      DISK_SIZE_GB: ${DISK_SIZE_GB:-16}
      EMULATION_STUBS: ${EMULATION_STUBS:-1}
      ENABLE_FAKE_DISPLAY: ${ENABLE_FAKE_DISPLAY:-0}
      DISPLAY_MODE: ${DISPLAY_MODE:-none}
      PUID: ${PUID:-99}
      PGID: ${PGID:-100}
      SSH_PORT: ${SSH_PORT:-2222}
      WEBCONF_PORT: ${WEBCONF_PORT:-8080}
      HTTPS_PORT: ${HTTPS_PORT:-8443}
      NOVNC_PORT: ${NOVNC_PORT:-6080}
      VNC_PORT: ${VNC_PORT:-5900}
      DISPLAY_VNC_PORT: ${DISPLAY_VNC_PORT:-5901}
      ZYNTHIAN_IMAGE_URL: ${ZYNTHIAN_IMAGE_URL:-}
    volumes:
      - ${ZYNTHIAN_DATA_PATH:-./data}:/data
      # Optional USB passthrough for audio/MIDI:
      # - /dev/bus/usb:/dev/bus/usb
    ports:
      - "${SSH_PORT:-2222}:2222"
      - "${WEBCONF_PORT:-8080}:8080"
      - "${HTTPS_PORT:-8443}:8443"
      - "${NOVNC_PORT:-6080}:6080"
      - "${VNC_PORT:-5900}:5900"
      # Port 5901 is the QEMU built-in VNC display server (DISPLAY_MODE=vnc only).
      # It is NOT the Zynthian guest VNC (which is on port 5900 above).
      - "${DISPLAY_VNC_PORT:-5901}:5901"
